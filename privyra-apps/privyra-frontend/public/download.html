<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privyra Source Download</title>
    <style>
      :root {
        --bg: #0f1117;
        --card: #151926;
        --text: #ffffff;
        --muted: #b8bcc8;
        --accent: #00f5ff;
        --accent-dark: #00d3dc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background:
          radial-gradient(circle at 15% 20%, rgba(11, 61, 145, 0.35), transparent 45%),
          radial-gradient(circle at 85% 10%, rgba(108, 99, 255, 0.22), transparent 45%),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.25rem;
      }

      .card {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(21, 25, 38, 0.82);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.1rem);
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin: 0.9rem 0 1.5rem;
      }

      .download-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0.95rem 1.15rem;
        border-radius: 999px;
        border: none;
        font-size: 1rem;
        font-weight: 700;
        color: #0f1117;
        background: var(--accent);
        cursor: pointer;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
      }

      .download-button:hover,
      .download-button:focus-visible {
        transform: translateY(-1px);
        background: var(--accent-dark);
        box-shadow: 0 0 24px rgba(0, 245, 255, 0.42);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Download Privyra Source Bundle</h1>
      <p>Tap the button below to download your ZIP file.</p>

      <a
        href="/api/download/privyra-sources"
        class="download-button"
        download="Privyra_Sources.zip"
        data-testid="download-zip-button"
      >
        Download ZIP
      </a>
    </main>
  </body>
</html>
